# Sample host override file.
#
# Demonstrates per-host overrides of the shared `paths` block — for
# hosts where packages must live outside `$HOME` (e.g. on external
# storage).
#
# With `tools --config examples/`, this file is merged on top of
# `config.yaml` lexicographically: `config.yaml` loads first, then
# `overrides.yaml` replaces any overlapping scalar keys while leaving
# untouched keys alone.
#
# Only keys the reconcilers actually read are shown (see the `paths`
# comment block in config.yaml for the full list).

paths:
  bun: /Volumes/Storage/Data/bun/bin
  bunBin: /Volumes/Storage/Data/bun/bin
  npmBin: /Volumes/Storage/Data/npm/bin
  uvBin: /Volumes/Storage/Data/uv/bin
  uvToolDir: /Volumes/Storage/Data/uv/tools
