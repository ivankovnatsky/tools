# Sample tools config (YAML).
#
# `tools --config path/to/file.yaml` loads a single file.
# `tools --config path/to/dir/`       loads every supported file in the
#                                     directory (lexicographic order,
#                                     deep-merged: scalars replace,
#                                     dicts recurse, lists replace).
#
# Supported formats in a config directory: .json, .yaml, .yml, .toml.

stateFile: ~/.local/state/tools/state.json

# The keys the reconcilers actually read. bun and npm index theirs directly,
# so a section is only safe to enable once its keys are present.
#
#   bun       directory containing the `bun` binary       (bun)
#   bunBin    where `bun install -g` puts binaries        (bun)
#   nodejs    directory containing `node` and `npm`       (bun, npm, mcp)
#   npmBin    where `npm install -g` puts binaries        (npm, mcp)
#   uv        directory containing the `uv` binary        (uv)
#   uvBin     where `uv tool install` puts binaries       (uv)
#   uvToolDir uv's tool root                              (uv)
#   goBin     $GOBIN for `go install`                     (go)
#   goPath    $GOPATH for `go install`                    (go)
#   python    directory containing `python`               (mcp)
#   claudeCli full path to the `claude` binary            (mcp)
paths:
  bun: ~/.bun/bin
  bunBin: ~/.bun/bin
  nodejs: /usr/bin
  npmBin: ~/.npm/bin
  uv: /usr/bin
  uvBin: ~/.local/bin
  uvToolDir: ~/.local/share/uv/tools
  goBin: ~/.go/bin
  goPath: ~/.go
  python: /usr/bin
  claudeCli: ~/.local/bin/claude

bun:
  packages: {}

npm:
  packages: {}

uv:
  packages: {}

# Go packages are installed with `go install <module>@<version>`.
# `paths.goBin`/`paths.goPath` above are propagated to `go install`
# as $GOBIN / $GOPATH so binaries land where we tell them. If both
# are omitted, tools falls back to `go env GOBIN`/`go env GOPATH/bin`.
go:
  packages: {}

mcp:
  servers: {}

curlShell: {}

gitRepos: {}

# `packages` may also be a dict of {app_id: {remote: ...}} to pin an
# app to one remote when several carry the same ID.
flatpak:
  remotes: {}
  packages: []
