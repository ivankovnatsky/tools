# Sample tools config (YAML).
#
# `tools --config path/to/file.yaml` loads a single file.
# `tools --config path/to/dir/`       loads every supported file in the
#                                     directory (lexicographic order,
#                                     deep-merged: scalars replace,
#                                     dicts recurse, lists replace).
#
# Supported formats in a config directory: .json, .yaml, .yml, .toml.

stateFile: ~/.local/state/tools/state.json

paths:
  bun: ~/.bun
  npm: ~/.npm-global
  uv: ~/.local/share/uv/tools
  goBin: ~/go/bin
  goPath: ~/go
  mcp: ~/.config/claude/claude_desktop_config.json
  curlShell: ~/.local/bin
  gitRepos: ~/src

bun:
  packages: {}

npm:
  packages: {}

uv:
  packages: {}

# Go packages are installed with `go install <module>@<version>`.
# `paths.goBin`/`paths.goPath` above are propagated to `go install`
# as $GOBIN / $GOPATH so binaries land where we tell them. If both
# are omitted, tools falls back to `go env GOBIN`/`go env GOPATH/bin`.
go:
  packages: {}

mcp:
  servers: {}

curlShell: {}

gitRepos: {}

# `packages` may also be a dict of {app_id: {remote: ...}} to pin an
# app to one remote when several carry the same ID.
flatpak:
  remotes: {}
  packages: []
